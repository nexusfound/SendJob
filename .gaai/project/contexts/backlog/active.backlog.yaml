# GAAI Active Backlog — SendJob
# Sprint 2: Dispatch
# Sprint Goal: A dispatcher can assign a job to a technician via SMS reply or dashboard.
#              Job status updates correctly in both paths.
# Capacity: 10 hrs planned / 12 hrs available / 2 hr buffer
# Updated: 2026-03-15

items:

  - id: E02S01
    epic: E02
    title: "Twilio inbound webhook: receive dispatcher SMS reply, route to N8N"
    priority: high
    status: refined
    estimate_hrs: 2
    artefact: contexts/artefacts/stories/E02S01.story.md
    dependencies: []
    notes: >
      Twilio webhook URL must point to nexusfound.cloud N8N endpoint over HTTPS.
      Verify SSL cert is valid before wiring. Budget 1hr debug buffer —
      this is the most common N8N/Twilio integration snag.

  - id: E02S02
    epic: E02
    title: "N8N: parse dispatcher SMS reply, match tech name/code to config table roster, mark job Assigned"
    priority: high
    status: refined
    estimate_hrs: 2
    artefact: contexts/artefacts/stories/E02S02.story.md
    dependencies: [E02S01]
    notes: >
      HTTP Request node queries Supabase techs table by client_id + name match.
      Supabase returns array — access as $json[0].id.
      On match: PATCH jobs table to set tech_id, status = Assigned, assigned_at = now().
      Use HTTP Request nodes only — no native Supabase nodes (bugged in n8n v2.6.4).

  - id: E02S03
    epic: E02
    title: "N8N: send error SMS to dispatcher if reply doesn't match a known tech"
    priority: high
    status: refined
    estimate_hrs: 0.5
    artefact: contexts/artefacts/stories/E02S03.story.md
    dependencies: [E02S02]
    notes: >
      Branch after tech lookup — if no match found, Twilio SMS back to dispatcher_phone.
      Message should include valid tech names/codes so dispatcher can correct quickly.

  - id: E02S04
    epic: E02
    title: "N8N: send 'already assigned' SMS if job is no longer in New status"
    priority: high
    status: refined
    estimate_hrs: 0.5
    artefact: contexts/artefacts/stories/E02S04.story.md
    dependencies: [E02S02]
    notes: >
      Check jobs.status before attempting assignment.
      If status != New, return SMS to dispatcher: job ID + current status + assigned tech name.

