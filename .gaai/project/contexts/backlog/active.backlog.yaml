  - id: E05S01
    epic: E05
    title: "Status-based magic link token expiry — expire 24hrs after tech's last job marked Complete"
    priority: medium
    status: idea
    estimate_hrs: 2
    artefact: ~
    dependencies: [E04S01]
    notes: >
      PRD spec (final, resolved): token stays valid while tech has any active jobs
      (status in New, Assigned, En Route, On Site). Token expires 24 hours after their
      last job is marked Complete. One active token per tech — new assignment already
      issues a fresh token (E03S02 done).
      Implementation: n8n scheduled workflow (daily or every few hours) checks techs table
      for rows where all their jobs are Complete AND token_issued_at + 24hrs < now().
      On match: NULL out magic_link_token (or set a token_expired boolean).
      Tech dashboard (E03S08) already shows the expired-token error page.
      Error message will also need updating once "Text JOBS" renewal (E05S02) is built —
      current message says "Contact your dispatcher" instead of the PRD-specified
      "Text JOBS to [number] to get your current jobs."

