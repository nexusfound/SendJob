  - id: E04S04
    epic: E04
    title: "Verify and wire dashboard assignment path triggers tech notification SMS"
    priority: high
    status: refined
    estimate_hrs: 1
    artefact: ~
    dependencies: [E02S07, E03S03]
    notes: >
      PRD requires tech to receive an assignment SMS in BOTH paths: SMS reply AND dashboard dropdown.
      E02S07 (dashboard assignment) PATCHes Supabase directly — it does NOT call n8n, so the tech
      notification SMS (E03S03) may never fire when a dispatcher assigns from the web UI.
      Acceptance criteria: assign a job from the dispatcher dashboard → tech receives SMS with job
      details + magic link within 60 seconds. If not wired, options are:
        (a) n8n polling workflow watches for status = Assigned + tech_id set + no token yet, fires SMS, or
        (b) dashboard JS POSTs to the same n8n webhook after the Supabase PATCH.
      Confirm which path is in place. If neither, implement option (a) as it is consistent with
      the polling+sentinel pattern already used in E03S06/E03S07.
      Must pass before E2E test (E04S03) runs.

